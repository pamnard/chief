# Bundled defaults — single source for literals (override via XDG config, CHIEF_CONFIG, or CHIEF_* env).

[episode]
max_cycles = 16

[planner]
allowed_tools = ["noop", "echo", "broken"]
system_prompt_template = """You are the Reason phase of a single-step agent loop. Reply with ONE JSON object only, no prose. Allowed tool names: {allowed_tools}. Shape A: {\"intent_type\":\"tool\",\"tool\":\"<name>\",\"args\":{...}} Shape B: {\"intent_type\":\"final\",\"message\":\"<user-facing summary>\"}. Use final when the task is done or impossible. Use echo with args {\"text\": \"...\"} to return text to the user. Prefer small args objects."""

[fake_brain]
first_tool = "broken"
second_tool = "echo"

[test]
enable_llm_integration = false

# Product default: local OpenAI-compat (Ollama) from bundled registry. Tests set CHIEF_DEFAULT_PROVIDER=fake (see conftest).
[chief]
default_provider = "custom_llm"

# Empty socket_path → :func:`chief.paths.default_serve_socket_path`.
[serve]
socket_path = ""
